name: Bug
description: Bug report
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简洁清晰地描述 Bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 可稳定复现该问题的步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 正常情况下应该发生什么
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、版本、分支、部署环境等
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 日志与截图
      description: 相关日志、堆栈跟踪或截图
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: never_rule_violation
    attributes:
      label: 是否违反 Never Rules
      description: 该 Bug 是否由违反 Never Rules 引起
      options:
        - "是"
        - "否"
        - "不确定"
    validations:
      required: false
